<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Kubernetes helm wheel: outer ring, 7 spokes, hub -->
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="33" fill="rgba(66,175,250,0.12)" stroke="#42affa" stroke-width="2.5"/>
  <!-- Inner ring (to close spoke ends) -->
  <circle cx="40" cy="40" r="8" fill="rgba(66,175,250,0.12)" stroke="#42affa" stroke-width="2"/>
  <!-- 7 spokes -->
  <line x1="40.0" y1="32.0" x2="40.0" y2="10.0" stroke="#42affa" stroke-width="2.5"/>
  <line x1="46.25" y1="35.01" x2="63.45" y2="21.3" stroke="#42affa" stroke-width="2.5"/>
  <line x1="47.8" y1="41.78" x2="69.25" y2="46.68" stroke="#42affa" stroke-width="2.5"/>
  <line x1="43.47" y1="47.21" x2="53.02" y2="67.03" stroke="#42affa" stroke-width="2.5"/>
  <line x1="36.53" y1="47.21" x2="26.98" y2="67.03" stroke="#42affa" stroke-width="2.5"/>
  <line x1="32.2" y1="41.78" x2="10.75" y2="46.68" stroke="#42affa" stroke-width="2.5"/>
  <line x1="33.75" y1="35.01" x2="16.55" y2="21.3" stroke="#42affa" stroke-width="2.5"/>
  <!-- Hub dot -->
  <circle cx="40" cy="40" r="4" fill="#42affa"/>
</svg>
