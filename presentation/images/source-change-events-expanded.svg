<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 300" width="920" height="300">
  <defs>
    <marker id="arr-sce" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#42affa"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEFT: Source System Cards                       -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- PostgreSQL -->
  <rect x="10" y="28" width="140" height="52" rx="10"
        fill="rgba(66,175,250,0.08)" stroke="rgba(66,175,250,0.35)" stroke-width="1.5"/>
  <text x="80" y="60" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="white">PostgreSQL</text>

  <!-- Cosmos DB -->
  <rect x="10" y="126" width="140" height="52" rx="10"
        fill="rgba(66,175,250,0.08)" stroke="rgba(66,175,250,0.35)" stroke-width="1.5"/>
  <text x="80" y="158" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="white">Cosmos DB</text>

  <!-- Kubernetes -->
  <rect x="10" y="224" width="140" height="52" rx="10"
        fill="rgba(66,175,250,0.08)" stroke="rgba(66,175,250,0.35)" stroke-width="1.5"/>
  <text x="80" y="256" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="15" font-weight="700" fill="white">Kubernetes</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- FAN-IN ROUTING: circuit-board convergence       -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Branch from PostgreSQL (y=54) -->
  <line x1="152" y1="54" x2="195" y2="54"
        stroke="#42affa" stroke-width="2"/>
  <circle cx="195" cy="54" r="3.5" fill="#42affa"/>
  <polyline points="195,54 220,54 220,152"
        fill="none" stroke="#42affa" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="220" cy="54" r="3.5" fill="#42affa"/>

  <!-- Branch from Cosmos DB (y=152) — straight to trunk -->
  <line x1="152" y1="152" x2="195" y2="152"
        stroke="#42affa" stroke-width="2"/>
  <circle cx="195" cy="152" r="3.5" fill="#42affa"/>
  <line x1="195" y1="152" x2="220" y2="152"
        stroke="#42affa" stroke-width="2"/>

  <!-- Branch from Kubernetes (y=250) -->
  <line x1="152" y1="250" x2="195" y2="250"
        stroke="#42affa" stroke-width="2"/>
  <circle cx="195" cy="250" r="3.5" fill="#42affa"/>
  <polyline points="195,250 220,250 220,152"
        fill="none" stroke="#42affa" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="220" cy="250" r="3.5" fill="#42affa"/>

  <!-- Junction node -->
  <circle cx="240" cy="152" r="5" fill="#42affa"/>

  <!-- Trunk: fan-in merge → Source -->
  <line x1="220" y1="152" x2="285" y2="152"
        stroke="#42affa" stroke-width="2.5" marker-end="url(#arr-sce)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SOURCE BOX                                      -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="288" y="97" width="120" height="110" rx="12"
        fill="rgba(66,175,250,0.10)" stroke="#42affa" stroke-width="2"/>
  <text x="348" y="158" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Source</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Arrow: Source → Source Change Events             -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="410" y1="152" x2="449" y2="152"
        stroke="#42affa" stroke-width="2.5" marker-end="url(#arr-sce)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- SOURCE CHANGE EVENTS (compact)                  -->
  <!-- ═══════════════════════════════════════════════ -->
  <text x="575" y="30" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="13" font-weight="600" fill="#42affa">Source Change Events</text>
  <rect x="450" y="38" width="250" height="180" rx="10"
        fill="rgba(66,175,250,0.03)" stroke="rgba(66,175,250,0.20)"
        stroke-width="1" stroke-dasharray="6,3"/>

  <!-- Insert Card -->
  <rect x="461" y="50" width="228" height="44" rx="8"
        fill="rgba(66,175,250,0.12)" stroke="rgba(66,175,250,0.50)" stroke-width="1.5"/>
  <circle cx="476" cy="66" r="5" fill="#4ade80"/>
  <text x="490" y="66" font-family="system-ui,-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="white">Insert</text>
  <text x="490" y="82" font-family="system-ui,-apple-system,sans-serif"
        font-size="10" fill="rgba(255,255,255,0.55)">Node { labels, ref, properties }</text>

  <!-- Update Card -->
  <rect x="461" y="106" width="228" height="44" rx="8"
        fill="rgba(66,175,250,0.12)" stroke="rgba(66,175,250,0.50)" stroke-width="1.5"/>
  <circle cx="476" cy="122" r="5" fill="#42affa"/>
  <text x="490" y="122" font-family="system-ui,-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="white">Update</text>
  <text x="490" y="138" font-family="system-ui,-apple-system,sans-serif"
        font-size="10" fill="rgba(255,255,255,0.55)">Node { labels, ref, properties }</text>

  <!-- Delete Card -->
  <rect x="461" y="162" width="228" height="44" rx="8"
        fill="rgba(66,175,250,0.12)" stroke="rgba(66,175,250,0.50)" stroke-width="1.5"/>
  <circle cx="476" cy="178" r="5" fill="#f87171"/>
  <text x="490" y="178" font-family="system-ui,-apple-system,sans-serif"
        font-size="13" font-weight="700" fill="white">Delete</text>
  <text x="490" y="194" font-family="system-ui,-apple-system,sans-serif"
        font-size="10" fill="rgba(255,255,255,0.55)">metadata: { ref, labels }</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Arrow: Source Change Events → Continuous Query   -->
  <!-- ═══════════════════════════════════════════════ -->
  <line x1="702" y1="152" x2="733" y2="152"
        stroke="#42affa" stroke-width="2.5" marker-end="url(#arr-sce)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- CONTINUOUS QUERY BOX                            -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="736" y="82" width="172" height="140" rx="12"
        fill="rgba(66,175,250,0.18)" stroke="#42affa" stroke-width="3"/>
  <text x="822" y="142" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Continuous</text>
  <text x="822" y="164" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="18" font-weight="700" fill="white">Query</text>
  <text x="822" y="184" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="11" fill="rgba(255,255,255,0.40)">processes changes</text>
</svg>
