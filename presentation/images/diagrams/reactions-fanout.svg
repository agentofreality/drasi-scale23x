<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" width="920" height="320">
  <defs>
    <marker id="arr-rc" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#42affa"/>
    </marker>
  </defs>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- LEFT: Result Change Event                      -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="10" y="110" width="180" height="100" rx="12"
        fill="rgba(167,139,250,0.10)" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="100" y="148" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="white">Result Change</text>
  <text x="100" y="170" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="17" font-weight="700" fill="white">Notification</text>
  <text x="100" y="192" text-anchor="middle"
        font-family="system-ui,-apple-system,sans-serif"
        font-size="10" fill="rgba(255,255,255,0.40)">added · updated · deleted</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- ROUTING LINES: circuit-board fan-out            -->
  <!-- ═══════════════════════════════════════════════ -->
  <!-- Main trunk -->
  <line x1="192" y1="160" x2="290" y2="160"
        stroke="#42affa" stroke-width="2.5"/>

  <!-- Junction node -->
  <circle cx="290" cy="160" r="5" fill="#42affa"/>

  <!-- Branch to top (Real-Time UI) -->
  <polyline points="290,160 290,62 380,62"
        fill="none" stroke="#42affa" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="290" cy="62" r="3.5" fill="#42affa"/>
  <circle cx="380" cy="62" r="3.5" fill="#42affa"/>
  <line x1="383" y1="62" x2="430" y2="62"
        stroke="#42affa" stroke-width="2" marker-end="url(#arr-rc)"/>

  <!-- Branch to middle (System Integration) -->
  <line x1="290" y1="160" x2="380" y2="160"
        stroke="#42affa" stroke-width="2"/>
  <circle cx="380" cy="160" r="3.5" fill="#42affa"/>
  <line x1="383" y1="160" x2="430" y2="160"
        stroke="#42affa" stroke-width="2" marker-end="url(#arr-rc)"/>

  <!-- Branch to bottom (Data Write-Back) -->
  <polyline points="290,160 290,258 380,258"
        fill="none" stroke="#42affa" stroke-width="2" stroke-linejoin="round"/>
  <circle cx="290" cy="258" r="3.5" fill="#42affa"/>
  <circle cx="380" cy="258" r="3.5" fill="#42affa"/>
  <line x1="383" y1="258" x2="430" y2="258"
        stroke="#42affa" stroke-width="2" marker-end="url(#arr-rc)"/>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- RIGHT: Reaction Cards                           -->
  <!-- ═══════════════════════════════════════════════ -->

  <!-- Card 1: Real-Time UI -->
  <rect x="440" y="18" width="460" height="88" rx="10"
        fill="rgba(66,175,250,0.08)" stroke="rgba(66,175,250,0.35)" stroke-width="1.5"/>
  <text x="470" y="48" font-family="system-ui,-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="white">Real-Time UI</text>
  <text x="470" y="68" font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="rgba(255,255,255,0.55)">Push live updates to dashboards and frontends</text>
  <g transform="translate(470, 78)">
    <rect x="0" y="0" width="62" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="31" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">SignalR</text>
    <rect x="70" y="0" width="38" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="89" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">SSE</text>
  </g>

  <!-- Card 2: System Integration -->
  <rect x="440" y="116" width="460" height="88" rx="10"
        fill="rgba(66,175,250,0.08)" stroke="rgba(66,175,250,0.35)" stroke-width="1.5"/>
  <text x="470" y="146" font-family="system-ui,-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="white">System Integration</text>
  <text x="470" y="166" font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="rgba(255,255,255,0.55)">Trigger workflows, functions, and event buses</text>
  <g transform="translate(470, 176)">
    <rect x="0" y="0" width="72" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="36" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">Webhooks</text>
    <rect x="80" y="0" width="80" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="120" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">Event Grid</text>
    <rect x="168" y="0" width="72" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="204" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">Debezium</text>
    <rect x="248" y="0" width="48" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="272" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">Dapr</text>
  </g>

  <!-- Card 3: Data Write-Back -->
  <rect x="440" y="214" width="460" height="88" rx="10"
        fill="rgba(66,175,250,0.08)" stroke="rgba(66,175,250,0.35)" stroke-width="1.5"/>
  <text x="470" y="244" font-family="system-ui,-apple-system,sans-serif"
        font-size="16" font-weight="700" fill="white">Data Write-Back</text>
  <text x="470" y="264" font-family="system-ui,-apple-system,sans-serif"
        font-size="12" fill="rgba(255,255,255,0.55)">Write changes back to databases and graphs</text>
  <g transform="translate(470, 274)">
    <rect x="0" y="0" width="84" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="42" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">Stored Procs</text>
    <rect x="92" y="0" width="60" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="122" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">Gremlin</text>
    <rect x="160" y="0" width="72" height="20" rx="4"
          fill="rgba(66,175,250,0.15)" stroke="rgba(66,175,250,0.30)" stroke-width="1"/>
    <text x="196" y="14" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif"
          font-size="9.5" font-weight="600" fill="#42affa">Dataverse</text>
  </g>
</svg>
