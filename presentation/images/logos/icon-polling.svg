<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Clock face -->
  <circle cx="32" cy="32" r="22" fill="rgba(66,175,250,0.10)" stroke="#42affa" stroke-width="2"/>
  <!-- Hour ticks -->
  <line x1="32" y1="12" x2="32" y2="16" stroke="#42affa" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="32" x2="48" y2="32" stroke="#42affa" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="52" x2="32" y2="48" stroke="#42affa" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="32" x2="16" y2="32" stroke="#42affa" stroke-width="2" stroke-linecap="round"/>
  <!-- Hour hand pointing ~10 -->
  <line x1="32" y1="32" x2="22" y2="21" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand pointing ~12 -->
  <line x1="32" y1="32" x2="32" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="2.5" fill="#42affa"/>
  <!-- Circular repeat arrow (bottom-right, 120° arc) -->
  <path d="M 48,40 A 18,18 0 0 1 16,40" fill="none" stroke="#42affa" stroke-width="2" stroke-linecap="round"/>
  <!-- arrowhead at end of arc (pointing left-down) -->
  <polyline points="13,37 16,40 20,38" fill="none" stroke="#42affa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
